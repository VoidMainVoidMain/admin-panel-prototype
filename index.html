\"act-pdf\" ${svcProfile.action === 'act-pdf' ? 'checked' : ''} /> pdf tickets attachment<\u002Flabel>\n              <label><input type=\"checkbox\" class=\"chk\" data-k=\"act-smsr\" ${svcProfile.action === 'act-smsr' ? 'checked' : ''} /> sms reminder<\u002Flabel>\n              <label><input type=\"checkbox\" class=\"chk\" data-k=\"act-war\" ${svcProfile.action === 'act-war' ? 'checked' : ''} /> whatsapp reminder<\u002Flabel>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"bp-foot\">\n          <label class=\"opt\">\n            <input type=\"checkbox\" class=\"chk\" data-k=\"override\" checked />\n            Override existing values\n          <\u002Flabel>\n          <span class=\"meta\">Will update <b id=\"bp-update-count\">${totalCities}<\u002Fb> rows<\u002Fspan>\n          <button class=\"btn\" data-act=\"cancel\">Cancel<\u002Fbutton>\n          <button class=\"btn btn-primary\" data-act=\"apply\">Apply<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Ftd>\n  `;\n\n  anchorTr.classList.add('editing');\n  anchorTr.parentNode.insertBefore(tr, anchorTr.nextSibling);\n\n  // Live local-currency hint next to the Fixed fee input\n  const fixedInp = tr.querySelector('[data-k=\"fixed\"]');\n  const fixedHint = tr.querySelector('[data-k=\"fixed-local\"]');\n  function refreshFixedHint() {\n    if (!fixedInp || !fixedHint) return;\n    // Service-level bulk edit: hint is noisy and unhelpful (multi-currency); hide it\n    if (scope === 'service') { fixedHint.textContent = ''; return; }\n    const v = fixedInp.value;\n    if (v === '' || isNaN(parseFloat(v))) { fixedHint.textContent = ''; return; }\n    const usd = parseFloat(v);\n    // List unique target currencies among selected rows (computed lazily)\n    const curs = new Set();\n    leafRows.forEach((r) => curs.add(r.dataset.currency || 'USD'));\n    curs.delete('USD');\n    if (curs.size === 0) { fixedHint.textContent = ''; return; }\n    const parts = [...curs].slice(0, 3).map((c) => {\n      const dec = fixedDecimals(c);\n      return `${ceilTo(usd * (RATES[c] ?? 1), dec).toFixed(dec)} ${c}`;\n    });\n    if (curs.size > 3) parts.push(`+${curs.size - 3} more`);\n    fixedHint.textContent = '≈ ' + parts.join(' / ');\n  }\n  fixedInp?.addEventListener('input', refreshFixedHint);\n  refreshFixedHint();\n\n  // Segmented selectors\n  tr.querySelectorAll('.bp-seg').forEach((seg) => {\n    seg.addEventListener('click', (e) => {\n      const b = e.target.closest('button');\n      if (!b) return;\n      seg.querySelectorAll('button').forEach((x) => x.classList.remove('on'));\n      b.classList.add('on');\n    });\n  });\n\n  // Scope toggle\n  const targetsEl = tr.querySelector('#bp-targets');\n  const scopePick = tr.querySelector('[data-k=\"scopepick\"]');\n  scopePick.addEventListener('click', (e) => {\n    const b = e.target.closest('button');\n    if (!b) return;\n    scopePick.querySelectorAll('button').forEach((x) => x.classList.remove('on'));\n    b.classList.add('on');\n    if (b.dataset.v === 'custom') {\n      targetsEl.classList.add('on');\n    } else {\n      targetsEl.classList.remove('on');\n      // Re-check all\n      targetsEl.querySelectorAll('.country-cb').forEach((c) => c.checked = true);\n      targetsEl.querySelectorAll('.city-chip').forEach((c) => c.classList.add('on'));\n      recountTargets();\n    }\n  });\n\n  function getSelectedRows() {\n    const onAll = scopePick.querySelector('button.on').dataset.v === 'all';\n    if (onAll) return tree.flatMap((t) => t.cities.map((c) => c.row));\n    const ids = new Set([...targetsEl.querySelectorAll('.city-chip.on')].map((c) => c.dataset.id));\n    return tree.flatMap((t) => t.cities).filter((c) => ids.has(c.id)).map((c) => c.row);\n  }\n\n  function recountTargets() {\n    let custom = 0;\n    targetsEl.querySelectorAll('.country-block').forEach((blk) => {\n      const sel = blk.querySelectorAll('.city-chip.on').length;\n      const total = blk.querySelectorAll('.city-chip').length;\n      blk.querySelector('.csel').textContent = sel;\n      const cb = blk.querySelector('.country-cb');\n      cb.checked = sel > 0;\n      cb.indeterminate = sel > 0 && sel < total;\n      custom += sel;\n    });\n    tr.querySelector('#bp-cnt-custom').textContent = custom;\n    const isCustom = scopePick.querySelector('button.on').dataset.v === 'custom';\n    tr.querySelector('#bp-update-count').textContent = isCustom ? custom : totalCities;\n  }\n\n  // City chip toggle\n  targetsEl.addEventListener('click', (e) => {\n    const chip = e.target.closest('.city-chip');\n    if (chip) {\n      chip.classList.toggle('on');\n      recountTargets();\n    }\n  });\n  // Country checkbox toggles all its city chips\n  targetsEl.addEventListener('change', (e) => {\n    const cb = e.target.closest('.country-cb');\n    if (!cb) return;\n    const blk = cb.closest('.country-block');\n    blk.querySelectorAll('.city-chip').forEach((c) => c.classList.toggle('on', cb.checked));\n    recountTargets();\n  });\n\n  // Cancel\n  tr.querySelector('[data-act=\"cancel\"]').addEventListener('click', () => {\n    anchorTr.classList.remove('editing');\n    tr.remove();\n  });\n\n  // Apply\n  tr.querySelector('[data-act=\"apply\"]').addEventListener('click', () => {\n    const rows = getSelectedRows();\n    if (rows.length === 0) {\n      alert('Select at least one city to apply changes.');\n      return;\n    }\n    const fixedRaw = tr.querySelector('[data-k=\"fixed\"]').value;\n    const pctRaw   = tr.querySelector('[data-k=\"pct\"]').value;\n    const fixed = fixedRaw === '' ? null : parseFloat(fixedRaw);\n    const pct   = pctRaw === '' ? null : parseFloat(pctRaw).toFixed(2);\n    const status = tr.querySelector('[data-k=\"status\"] .on')?.dataset.v || 'green';\n    const def    = tr.querySelector('[data-k=\"def\"] .on')?.dataset.v || 'checked';\n    const override = tr.querySelector('[data-k=\"override\"]').checked;\n    // The input is interpreted in the currencyHint shown next to it.\n    const inputCurrency = currencyHint;\n    const usdFixed = fixed === null ? null : (fixed / (RATES[inputCurrency] ?? 1));\n\n    rows.forEach((row) => {\n      const vCell = row.querySelector('.col-value');\n      if (vCell && (override || !vCell.dataset.touched) && (fixed !== null || pct !== null)) {\n        const rowCur = row.dataset.currency || inputCurrency;\n        const dec = fixedDecimals(rowCur);\n        const localFixed = usdFixed === null\n          ? parseFloat((row.querySelector('.num.accent-blue')?.textContent || '0'))\n          : ceilTo(usdFixed * (RATES[rowCur] ?? 1), dec);\n        const newPct = pct ?? (row.querySelector('.num.accent-green')?.textContent || '0.00');\n        const localFixedStr = localFixed.toFixed(dec);\n        // Update underlying data attrs so future bulk-edit pre-fills work correctly\n        if (usdFixed !== null) row.dataset.usdFixed = usdFixed.toFixed(4);\n        if (pct !== null) row.dataset.pct = newPct;\n        const usdStr = (usdFixed === null\n          ? parseFloat(row.dataset.usdFixed || '0')\n          : usdFixed\n        ).toFixed(2);\n        const localPart = rowCur !== 'USD'\n          ? `<span class=\"val-local\">(<span class=\"num-local\">${localFixedStr}<\u002Fspan><span class=\"cur-local\">${rowCur}<\u002Fspan>)<\u002Fspan>`\n          : '';\n        vCell.innerHTML = `<span class=\"val mono\">\n          <span class=\"num accent-blue\">${usdStr}<\u002Fspan><span class=\"cur\">USD<\u002Fspan>${localPart}\n          <span class=\"op\">+<\u002Fspan>\n          <span class=\"num accent-green\">${newPct}<\u002Fspan>\n          <span class=\"pct\">%<\u002Fspan>\n        <\u002Fspan>`;\n        vCell.classList.remove('flash'); void vCell.offsetWidth; vCell.classList.add('flash');\n      }\n      const sCell = row.querySelector('.col-status');\n      if (sCell) {\n        sCell.innerHTML = `<button class=\"status-toggle\" type=\"button\" data-status-toggle title=\"Click to toggle status\" aria-label=\"Toggle status\"><span class=\"dot ${status}\"><\u002Fspan><\u002Fbutton>`;\n        sCell.classList.remove('flash'); void sCell.offsetWidth; sCell.classList.add('flash');\n      }\n      const dCell = row.querySelector('.col-default');\n      if (dCell) {\n        dCell.innerHTML = renderDefaultTag(def);\n        dCell.classList.remove('flash'); void dCell.offsetWidth; dCell.classList.add('flash');\n      }\n    });\n\n    anchorTr.classList.remove('editing');\n    tr.remove();\n  });\n}\n\ntbody.addEventListener('click', (e) => {\n  const btn = e.target.closest('[data-bulk]');\n  if (!btn) return;\n  e.stopPropagation();\n  const groupId = btn.dataset.bulk;\n  const scope = btn.dataset.scope;\n  const anchor = btn.closest('tr');\n  // Make sure the group is expanded so user can see the change\n  if (anchor.classList.contains('collapsed')) {\n    anchor.click();\n  }\n  openBulkEdit(groupId, scope, anchor);\n});\n\n/* Archive service */\ntbody.addEventListener('click', (e) => {\n  const btn = e.target.closest('[data-archive]');\n  if (!btn) return;\n  e.stopPropagation();\n  const sId = btn.dataset.archive;\n  const grp = document.querySelector(`tr.grp-service[data-group=\"${sId}\"]`);\n  const svcName = grp?.querySelector('.grp-label')?.innerText.replace(/^.*Service\\s*/, '').split('·')[0].trim() || 'this service';\n\n  // Count cities under this service for impact estimate\n  let cityCount = 0;\n  document.querySelectorAll(`tr.grp-country[data-parent=\"${sId}\"]`).forEach((country) => {\n    const cId = country.dataset.group;\n    cityCount += document.querySelectorAll(`tr.row[data-parent=\"${cId}\"]`).length;\n    document.querySelectorAll(`tr.grp-config[data-parent=\"${cId}\"]`).forEach((cfg) => {\n      cityCount += document.querySelectorAll(`tr.row[data-parent=\"${cfg.dataset.group}\"]`).length;\n    });\n  });\n  // Estimated active events using this service (deterministic from name + city count)\n  const events = (window.__impactCount?.(sId + svcName + cityCount + 'archive')) ?? 0;\n\n  const doArchive = () => {\n    grp.style.transition = 'opacity .3s';\n    grp.style.opacity = '0.4';\n    document.querySelectorAll(`tr[data-parent=\"${sId}\"]`).forEach((country) => {\n      country.classList.add('hidden');\n      if (country.classList.contains('grp-country')) {\n        const cId = country.dataset.group;\n        document.querySelectorAll(`tr[data-parent=\"${cId}\"]`).forEach((kid) => {\n          kid.classList.add('hidden');\n          if (kid.classList.contains('grp-config')) {\n            const cfgId = kid.dataset.group;\n            document.querySelectorAll(`tr[data-parent=\"${cfgId}\"]`).forEach((leaf) => leaf.classList.add('hidden'));\n          }\n        });\n      }\n    });\n    setTimeout(() => grp.classList.add('hidden'), 350);\n  };\n\n  window.__confirm({\n    title: 'Delete this service?',\n    subtitle: svcName,\n    danger: true,\n    okText: 'Delete service',\n    body: `This service is used on <b>${events}<\u002Fb> events. Deleting it will remove it from all of them.<span class=\"small\">${cityCount} cities across all configured countries will also be removed. This action cannot be undone.<\u002Fspan>`,\n    meta: `Service · ${svcName}`,\n    onConfirm: doArchive,\n  });\n});\n\n/* ───── Selection ───── */\nconst selbar = document.getElementById('selbar');\nconst selCount = document.getElementById('selCount');\n\nfunction updateSelbar() {\n  const checked = document.querySelectorAll('.row-chk:checked').length;\n  selCount.textContent = checked;\n  selbar.classList.toggle('on', checked > 0);\n}\n\ndocument.getElementById('selAll').addEventListener('change', (e) => {\n  document.querySelectorAll('.row-chk').forEach((c) => { c.checked = e.target.checked; });\n  updateSelbar();\n});\n\ntbody.addEventListener('change', (e) => {\n  if (e.target.classList.contains('row-chk')) updateSelbar();\n\n  // Group checkbox toggles all leaves under it (3 levels: service → country → config → rows)\n  if (e.target.dataset.grp) {\n    const gid = e.target.dataset.grp;\n    const cb = e.target.checked;\n    // direct leaf children of this group\n    document.querySelectorAll(`tr[data-parent=\"${gid}\"] .row-chk`).forEach((c) => { c.checked = cb; });\n    // nested children: walk down through country → config → rows\n    document.querySelectorAll(`tr[data-parent=\"${gid}\"]`).forEach((tr) => {\n      if (tr.classList.contains('grp-country') || tr.classList.contains('grp-config')) {\n        const sub = tr.dataset.group;\n        document.querySelectorAll(`tr[data-parent=\"${sub}\"] .row-chk`).forEach((c) => { c.checked = cb; });\n        // and one more level (country → config → rows)\n        document.querySelectorAll(`tr[data-parent=\"${sub}\"]`).forEach((kid) => {\n          if (kid.classList.contains('grp-config')) {\n            document.querySelectorAll(`tr[data-parent=\"${kid.dataset.group}\"] .row-chk`).forEach((c) => { c.checked = cb; });\n          }\n        });\n      }\n    });\n    updateSelbar();\n  }\n});\n\n/* ───── Row click toggles active highlight ───── */\ntbody.addEventListener('click', (e) => {\n  const row = e.target.closest('tr.row');\n  if (!row) return;\n  if (e.target.closest('.col-chk')) return;\n  document.querySelectorAll('tr.row.active').forEach((r) => r.classList.remove('active'));\n  row.classList.add('active');\n});\n\n/* ───── New service modal ───── */\n(function(){\n  const modal = document.getElementById('newSvcModal');\n  const scrim = document.getElementById('scrim');\n  const openBtn = document.getElementById('newServiceBtn');\n  const closeBtn = document.getElementById('modalClose');\n  const cancelBtn = document.getElementById('ns-cancel');\n  const createBtn = document.getElementById('ns-create');\n  const status = document.getElementById('ns-status');\n  const statusLab = document.getElementById('ns-status-lab');\n\n  // Build country/city lists from data\n  const countryMap = new Map(); // key: country name → { flag, cities: [{name, id}] }\n  data.forEach((svc) => {\n    svc.countries.forEach((c) => {\n      if (!countryMap.has(c.name)) {\n        countryMap.set(c.name, { flag: c.flag, cities: new Map() });\n      }\n      const entry = countryMap.get(c.name);\n      c.cities.forEach((row) => {\n        entry.cities.set(row.city, row.id);\n      });\n    });\n  });\n\n  status.addEventListener('change', () => {\n    statusLab.textContent = status.checked ? 'Enabled' : 'Disabled';\n  });\n\n  // Rules engine for new service\n  const nsRulesList = document.getElementById('nsRulesList');\n  const nsRulesHead = document.getElementById('nsRulesHead');\n  const nsRuleSelect = document.getElementById('nsRuleSelect');\n  const nsRuleAdd = document.getElementById('nsRuleAdd');\n  let nsRules = [];\n\n  function nsRefreshSelect() {\n    const used = new Set(nsRules);\n    const opts = Object.entries(RULE_DEFS)\n      .filter(([k]) => !used.has(k))\n      .map(([k, def]) => `<option value=\"${k}\">${def.label}<\u002Foption>`).join('');\n    nsRuleSelect.innerHTML = opts || '<option value=\"\" disabled>All rules added<\u002Foption>';\n    nsRuleSelect.disabled = !opts;\n    nsRuleAdd.disabled = !opts;\n    nsRuleAdd.style.opacity = opts ? '1' : '0.5';\n  }\n  function nsRenderRules() {\n    if (nsRules.length === 0) {\n      nsRulesList.innerHTML = '';\n      nsRulesHead.textContent = 'No rules defined';\n    } else {\n      nsRulesHead.textContent = `${nsRules.length} rule${nsRules.length === 1 ? '' : 's'} active`;\n      nsRulesList.innerHTML = nsRules.map((k) => {\n        const def = RULE_DEFS[k]; if (!def) return '';\n        return `<div class=\"rule-item\" data-rule=\"${k}\">\n          <span class=\"rule-tone tone-${def.tone}\"><\u002Fspan>\n          <span class=\"rule-label\">${def.label}<\u002Fspan>\n          <span class=\"rule-key\">${k}<\u002Fspan>\n          <button type=\"button\" class=\"rule-remove\" data-remove=\"${k}\" title=\"Remove rule\" aria-label=\"Remove rule\">\n            <svg width=\"11\" height=\"11\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><path d=\"M18 6 6 18M6 6l12 12\"/><\u002Fsvg>\n          <\u002Fbutton>\n        <\u002Fdiv>`;\n      }).join('');\n    }\n    nsRefreshSelect();\n  }\n  nsRulesList.addEventListener('click', (e) => {\n    const btn = e.target.closest('[data-remove]');\n    if (!btn) return;\n    nsRules = nsRules.filter((r) => r !== btn.dataset.remove);\n    nsRenderRules();\n  });\n  nsRuleAdd.addEventListener('click', () => {\n    const v = nsRuleSelect.value;\n    if (!v || nsRules.includes(v)) return;\n    nsRules.push(v);\n    nsRenderRules();\n  });\n  nsRenderRules();\n\n  function buildCountryList() {\n    const list = document.getElementById('ns-country-list');\n    const q = document.getElementById('ns-country-search').value.trim().toLowerCase();\n    list.innerHTML = '';\n    [...countryMap.entries()]\n      .filter(([name]) => !q || name.toLowerCase().includes(q))\n      .forEach(([name, info]) => {\n        const lbl = document.createElement('label');\n        lbl.innerHTML = `\n          <input type=\"checkbox\" class=\"chk ns-country-chk\" data-name=\"${name}\" />\n          <span class=\"flag\"><svg width=\"16\" height=\"11\"><use href=\"#${info.flag}\"/><\u002Fsvg><\u002Fspan>\n          <span>${name}<\u002Fspan>\n          <span style=\"margin-left:auto;color:var(--text-mute);font-size:11px;\">${info.cities.size}<\u002Fspan>\n        `;\n        list.appendChild(lbl);\n      });\n    // Restore selection state\n    list.querySelectorAll('.ns-country-chk').forEach((cb) => {\n      cb.checked = selectedCountries.has(cb.dataset.name);\n    });\n  }\n\n  function buildCityList() {\n    const list = document.getElementById('ns-city-list');\n    const q = document.getElementById('ns-city-search').value.trim().toLowerCase();\n    list.innerHTML = '';\n\n    const allowed = [...selectedCountries];\n    if (allowed.length === 0) {\n      list.innerHTML = '<div class=\"grouphdr\" style=\"color:var(--text-mute);padding:14px 10px;\">Select countries first<\u002Fdiv>';\n      document.getElementById('ns-cities-summary').textContent = '';\n      return;\n    }\n    let total = 0, sel = 0;\n    allowed.forEach((country) => {\n      const info = countryMap.get(country);\n      const filtered = [...info.cities.keys()].filter((c) => !q || c.toLowerCase().includes(q));\n      if (filtered.length === 0) return;\n      const hdr = document.createElement('div');\n      hdr.className = 'grouphdr';\n      hdr.textContent = country;\n      list.appendChild(hdr);\n      filtered.forEach((city) => {\n        const lbl = document.createElement('label');\n        lbl.innerHTML = `\n          <input type=\"checkbox\" class=\"chk ns-city-chk\" data-country=\"${country}\" data-city=\"${city}\" />\n          <span>${city}<\u002Fspan>\n        `;\n        list.appendChild(lbl);\n      });\n      total += info.cities.size;\n      sel += [...info.cities.keys()].filter((c) => selectedCities.has(country + '|' + c)).length;\n    });\n    list.querySelectorAll('.ns-city-chk').forEach((cb) => {\n      cb.checked = selectedCities.has(cb.dataset.country + '|' + cb.dataset.city);\n    });\n    updateCitySummary();\n  }\n\n  function updateCitySummary() {\n    document.getElementById('ns-cities-summary').textContent =\n      `${selectedCities.size} selected`;\n    document.getElementById('ns-summary').textContent =\n      `${selectedCities.size} ${selectedCities.size === 1 ? 'city' : 'cities'} across ${selectedCountries.size} ${selectedCountries.size === 1 ? 'country' : 'countries'}`;\n  }\n\n  let selectedCountries = new Set();\n  let selectedCities = new Set();\n\n  function open() {\n    selectedCountries = new Set();\n    selectedCities = new Set();\n    document.getElementById('ns-country-search').value = '';\n    document.getElementById('ns-city-search').value = '';\n    nsRules = [];\n    nsRenderRules();\n    buildCountryList();\n    buildCityList();\n    modal.classList.add('on');\n    modal.setAttribute('aria-hidden', 'false');\n    scrim.classList.add('on');\n  }\n  function close() {\n    modal.classList.remove('on');\n    modal.setAttribute('aria-hidden', 'true');\n    scrim.classList.remove('on');\n  }\n\n  openBtn.addEventListener('click', open);\n  closeBtn.addEventListener('click', close);\n  cancelBtn.addEventListener('click', close);\n  scrim.addEventListener('click', () => {\n    if (modal.classList.contains('on')) close();\n  });\n  document.addEventListener('keydown', (e) => {\n    if (e.key === 'Escape' && modal.classList.contains('on')) close();\n  });\n\n  document.getElementById('ns-country-search').addEventListener('input', buildCountryList);\n  document.getElementById('ns-city-search').addEventListener('input', buildCityList);\n\n  document.getElementById('ns-country-list').addEventListener('change', (e) => {\n    if (!e.target.classList.contains('ns-country-chk')) return;\n    const name = e.target.dataset.name;\n    if (e.target.checked) {\n      selectedCountries.add(name);\n    } else {\n      selectedCountries.delete(name);\n      // Drop cities of this country\n      [...selectedCities].forEach((k) => {\n        if (k.startsWith(name + '|')) selectedCities.delete(k);\n      });\n    }\n    buildCityList();\n  });\n\n  document.getElementById('ns-city-list').addEventListener('change', (e) => {\n    if (!e.target.classList.contains('ns-city-chk')) return;\n    const key = e.target.dataset.country + '|' + e.target.dataset.city;\n    if (e.target.checked) selectedCities.add(key);\n    else selectedCities.delete(key);\n    updateCitySummary();\n  });\n\n  document.getElementById('ns-countries-all').addEventListener('click', () => {\n    [...countryMap.keys()].forEach((c) => selectedCountries.add(c));\n    buildCountryList();\n    buildCityList();\n  });\n  document.getElementById('ns-countries-none').addEventListener('click', () => {\n    selectedCountries.clear();\n    selectedCities.clear();\n    buildCountryList();\n    buildCityList();\n  });\n\n  createBtn.addEventListener('click', () => {\n    const name = document.getElementById('ns-name-en').value.trim();\n    if (!name) { alert('Service name (EN) is required.'); return; }\n    if (selectedCountries.size === 0) { alert('Select at least one country.'); return; }\n    if (selectedCities.size === 0) { alert('Select at least one city.'); return; }\n    alert(`Created “${name}” for ${selectedCities.size} cities.`);\n    close();\n  });\n})();\n\n/* ───── Filters popover ───── */\n(function(){\n  const btn = document.getElementById('filterToggle');\n  const pop = document.getElementById('filterPop');\n  const countBadge = document.getElementById('filterCount');\n\n  // Map service slug → service name (matches data) and country slug → country name\n  const SERVICE_SLUG = {\n    'refund': 'Refund Guarantee',\n    'wa-tickets': 'Send me tickets via WhatsApp',\n    'wa-rem': 'WhatsApp Reminder',\n  };\n  const COUNTRY_SLUG = {\n    'sa': 'Saudi Arabia',\n    'ae': 'United Arab Emirates',\n    'om': 'Oman',\n    'bh': 'Bahrain',\n  };\n\n  function getActiveValues(filter) {\n    const sel = pop.querySelector(`select[data-filter=\"${filter}\"]`);\n    if (sel) return [sel.value];\n    const seg = pop.querySelector(`.seg-ctl[data-filter=\"${filter}\"]`);\n    if (seg) return [seg.querySelector('.seg-btn.on')?.dataset.v || 'any'];\n    const ms = pop.querySelector(`.ms-dd[data-filter=\"${filter}\"]`);\n    if (ms) return [...ms.querySelectorAll('input[type=checkbox]:checked')].map((c) => c.dataset.v);\n    return [];\n  }\n\n  function applyFilters() {\n    const status = getActiveValues('status')[0] || 'any';        // single\n    const services = new Set(getActiveValues('service'));         // multi\n    const countries = new Set(getActiveValues('country'));        // multi\n    const def = getActiveValues('default')[0] || 'any';           // single\n    const min = parseFloat(document.getElementById('feeMin').value);\n    const max = parseFloat(document.getElementById('feeMax').value);\n\n    // Iterate leaf rows; track which group rows have any visible child\n    const visibleGroups = new Set();\n    document.querySelectorAll('tr.row').forEach((row) => {\n      const svcId = row.dataset.svc;\n      const cId = row.dataset.parent;\n\n      // Status\n      const dot = row.querySelector('.col-status .dot');\n      const rowStatus = dot && dot.classList.contains('green') ? 'green' : 'red';\n      if (status !== 'any' && status !== rowStatus) return hide(row);\n\n      // Service\n      const svcName = row.dataset.svcName;\n      const wantedSvcNames = new Set([...services].map((s) => SERVICE_SLUG[s]));\n      if (services.size === 0) return hide(row);\n      if (!wantedSvcNames.has(svcName)) return hide(row);\n\n      // Country (now stored directly on the row)\n      const countryName = row.dataset.countryName || '';\n      const wantedCountries = new Set([...countries].map((c) => COUNTRY_SLUG[c]));\n      if (countries.size === 0) return hide(row);\n      if (!wantedCountries.has(countryName)) return hide(row);\n\n      // Default value\n      const defTag = row.querySelector('.default-tag');\n      const rowDef = defTag?.className.match(/(checked|unchecked|required)/)?.[1] || 'checked';\n      if (def !== 'any' && def !== rowDef) return hide(row);\n\n      // Percent fee range\n      const valText = row.querySelector('.col-value')?.textContent || '';\n      const m = valText.match(/\\+?\\s*([\\d.]+)\\s*%/);\n      const pct = m ? parseFloat(m[1]) : NaN;\n      if (!isNaN(min) && !isNaN(pct) && pct < min) return hide(row);\n      if (!isNaN(max) && !isNaN(pct) && pct > max) return hide(row);\n\n      // Show\n      row.style.display = '';\n      visibleGroups.add(cId);\n      visibleGroups.add(svcId);\n    });\n\n    // Hide group rows with no visible leaves; show those that have\n    document.querySelectorAll('tr.grp').forEach((g) => {\n      g.style.display = visibleGroups.has(g.dataset.group) ? '' : 'none';\n    });\n\n    function hide(row) {\n      row.style.display = 'none';\n    }\n  }\n\n  // Track active filter state for the badge count\n  function recountBadge() {\n    let n = 0;\n    // Selects: count if not 'any'\n    pop.querySelectorAll('select[data-filter]').forEach((sel) => {\n      if (sel.value !== 'any') n++;\n    });\n    // Segmented controls: count if not 'any'\n    pop.querySelectorAll('.seg-ctl[data-filter]').forEach((seg) => {\n      const v = seg.querySelector('.seg-btn.on')?.dataset.v || 'any';\n      if (v !== 'any') n++;\n    });\n    // Multi-select dropdowns: count if not all checked\n    pop.querySelectorAll('.ms-dd[data-filter]').forEach((ms) => {\n      const total = ms.querySelectorAll('input[type=checkbox]').length;\n      const on = ms.querySelectorAll('input[type=checkbox]:checked').length;\n      if (on < total) n++;\n      // Update label\n      const label = ms.querySelector('.ms-label');\n      const filter = ms.dataset.filter;\n      const word = filter === 'service' ? 'services' : 'countries';\n      if (on === total) label.textContent = `All ${word} (${total})`;\n      else if (on === 0) label.textContent = `No ${word}`;\n      else if (on === 1) {\n        const lbl = ms.querySelector('input[type=checkbox]:checked').parentElement.textContent.trim();\n        label.textContent = lbl;\n      } else label.textContent = `${on} of ${total} ${word}`;\n    });\n    const min = document.getElementById('feeMin').value;\n    const max = document.getElementById('feeMax').value;\n    if (min !== '' || max !== '') n++;\n    if (!document.getElementById('hideArchived').checked) n++;\n\n    if (n > 0) {\n      countBadge.style.display = 'inline-block';\n      countBadge.textContent = n;\n    } else {\n      countBadge.style.display = 'none';\n    }\n  }\n\n  btn.addEventListener('click', (e) => {\n    e.stopPropagation();\n    pop.classList.toggle('on');\n  });\n  pop.addEventListener('click', (e) => e.stopPropagation());\n  document.addEventListener('click', () => pop.classList.remove('on'));\n  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') pop.classList.remove('on'); });\n\n  // Filter widgets: ms-dd open/close + select change\n  pop.querySelectorAll('.ms-dd').forEach((ms) => {\n    const trigger = ms.querySelector('.ms-trigger');\n    trigger.addEventListener('click', (e) => {\n      e.stopPropagation();\n      pop.querySelectorAll('.ms-dd.open').forEach((o) => { if (o !== ms) o.classList.remove('open'); });\n      ms.classList.toggle('open');\n    });\n    ms.querySelectorAll('input[type=checkbox]').forEach((cb) => {\n      cb.addEventListener('change', () => recountBadge());\n    });\n  });\n  pop.querySelectorAll('select[data-filter]').forEach((sel) => {\n    sel.addEventListener('change', () => recountBadge());\n  });\n  // Segmented control click handler\n  pop.querySelectorAll('.seg-ctl[data-filter]').forEach((seg) => {\n    seg.addEventListener('click', (e) => {\n      const btn = e.target.closest('.seg-btn');\n      if (!btn) return;\n      seg.querySelectorAll('.seg-btn').forEach((b) => b.classList.remove('on'));\n      btn.classList.add('on');\n      recountBadge();\n    });\n  });\n  pop.addEventListener('click', (e) => {\n    if (!e.target.closest('.ms-dd')) {\n      pop.querySelectorAll('.ms-dd.open').forEach((o) => o.classList.remove('open'));\n    }\n  });\n\n  document.getElementById('filterReset').addEventListener('click', () => {\n    pop.querySelectorAll('select[data-filter]').forEach((sel) => sel.value = 'any');\n    pop.querySelectorAll('.seg-ctl[data-filter]').forEach((seg) => {\n      seg.querySelectorAll('.seg-btn').forEach((b) => b.classList.toggle('on', b.dataset.v === 'any'));\n    });\n    pop.querySelectorAll('.ms-dd[data-filter] input[type=checkbox]').forEach((cb) => cb.checked = true);\n    document.getElementById('feeMin').value = '';\n    document.getElementById('feeMax').value = '';\n    document.getElementById('hideArchived').checked = true;\n    recountBadge();\n    applyFilters();\n  });\n\n  document.getElementById('filterCancel').addEventListener('click', () => pop.classList.remove('on'));\n  document.getElementById('filterApply').addEventListener('click', () => {\n    recountBadge();\n    applyFilters();\n    pop.classList.remove('on');\n  });\n\n  recountBadge();\n})();\n<\u002Fscript>\n\n<script>\n/* ===== Confirmation modal helper ===== */\n(function(){\n  const modal   = document.getElementById('confirmModal');\n  const scrim   = document.getElementById('scrim');\n  const titleEl = document.getElementById('confirmTitle');\n  const subEl   = document.getElementById('confirmSub');\n  const bodyEl  = document.getElementById('confirmBody');\n  const metaEl  = document.getElementById('confirmMeta');\n  const iconEl  = document.getElementById('confirmIcon');\n  const okBtn   = document.getElementById('confirmOk');\n  const cancel  = document.getElementById('confirmCancel');\n  const closeBtn = document.getElementById('confirmCloseBtn');\n  let onConfirm = null;\n\n  function open(opts) {\n    titleEl.textContent = opts.title || 'Confirm';\n    subEl.textContent   = opts.subtitle || '';\n    bodyEl.innerHTML    = opts.body || '';\n    metaEl.innerHTML    = opts.meta || '';\n    iconEl.textContent  = opts.danger ? '!' : '?';\n    okBtn.textContent   = opts.okText || 'Proceed';\n    okBtn.classList.toggle('btn-danger', !!opts.danger);\n    okBtn.classList.toggle('btn-primary', !opts.danger);\n    modal.classList.toggle('danger', !!opts.danger);\n    onConfirm = opts.onConfirm || null;\n    modal.classList.add('on');\n    modal.setAttribute('aria-hidden', 'false');\n    scrim.classList.add('on');\n  }\n  function close() {\n    modal.classList.remove('on');\n    modal.setAttribute('aria-hidden', 'true');\n    scrim.classList.remove('on');\n    onConfirm = null;\n  }\n  okBtn.addEventListener('click', () => {\n    const fn = onConfirm; close(); if (fn) fn();\n  });\n  cancel.addEventListener('click', close);\n  closeBtn.addEventListener('click', close);\n  scrim.addEventListener('click', () => { if (modal.classList.contains('on')) close(); });\n  document.addEventListener('keydown', (e) => {\n    if (e.key === 'Escape' && modal.classList.contains('on')) close();\n  });\n  window.__confirm = open;\n})();\n\n/* ===== Quick status toggle in table ===== */\n(function(){\n  // Pseudo-random but stable count of events per row, for the impact prompts\n  function impactCount(seed) {\n    let h = 0;\n    for (let i = 0; i < seed.length; i++) h = (h * 31 + seed.charCodeAt(i)) >>> 0;\n    return 14 + (h % 286); // 14..299 events\n  }\n  window.__impactCount = impactCount;\n\n  document.getElementById('tbody').addEventListener('click', (e) => {\n    const btn = e.target.closest('[data-status-toggle]');\n    if (!btn) return;\n    e.stopPropagation();\n    const row = btn.closest('tr.row');\n    if (!row) return;\n    const dot = btn.querySelector('.dot');\n    const wasGreen = dot.classList.contains('green');\n    const newStatus = wasGreen ? 'red' : 'green';\n    const newLabel  = newStatus === 'green' ? 'enable' : 'disable';\n    const id   = row.dataset.id || '';\n    const city = row.dataset.city || 'this row';\n    const svc  = row.dataset.svcName || 'this service';\n    const events = impactCount(id + city + svc);\n\n    window.__confirm({\n      title: `${newStatus === 'green' ? 'Enable' : 'Disable'} for ${city}?`,\n      subtitle: svc,\n      danger: newStatus === 'red',\n      okText: newStatus === 'green' ? 'Enable' : 'Disable',\n      body: `This change will affect <b>${events}<\u002Fb> events using this default service in <b>${city}<\u002Fb>. Proceed?<span class=\"small\">Historical orders retain their original service data.<\u002Fspan>`,\n      meta: `Row #${id}`,\n      onConfirm: () => {\n        dot.classList.remove('green', 'red');\n        dot.classList.add(newStatus);\n        const sCell = row.querySelector('.col-status');\n        sCell.classList.remove('flash'); void sCell.offsetWidth; sCell.classList.add('flash');\n      },\n    });\n  }, true);\n})();\n\n/* ===== Row delete with confirmation ===== */\n(function(){\n  document.getElementById('tbody').addEventListener('click', (e) => {\n    const btn = e.target.closest('[data-del]');\n    if (!btn) return;\n    e.stopPropagation();\n    const row = btn.closest('tr.row');\n    if (!row) return;\n    const id   = row.dataset.id || '';\n    const city = row.dataset.city || 'this row';\n    const svc  = row.dataset.svcName || 'this service';\n    const events = window.__impactCount(id + city + svc + 'del');\n\n    window.__confirm({\n      title: 'Delete service entry?',\n      subtitle: `${svc} · ${city}`,\n      danger: true,\n      okText: 'Delete',\n      body: `This service is used on <b>${events}<\u002Fb> events. Deleting it will remove it from all of them. Proceed?<span class=\"small\">Historical orders retain the service data.<\u002Fspan>`,\n      meta: `Row #${id}`,\n      onConfirm: () => {\n        row.style.transition = 'opacity .2s';\n        row.style.opacity = '0';\n        setTimeout(() => row.remove(), 200);\n      },\n    });\n  }, true);\n})();\n\n/* ===== Save confirmation on the drawer ===== */\n(function(){\n  const saveBtn = document.getElementById('drawerSave');\n  if (!saveBtn) return;\n  // Intercept the existing click handler with a capture-phase guard\n  let bypass = false;\n  saveBtn.addEventListener('click', (e) => {\n    if (bypass) { bypass = false; return; }\n    e.stopImmediatePropagation();\n    e.preventDefault();\n    const drawer = document.getElementById('drawer');\n    const editingRow = document.querySelector('tr.row.editing');\n    const id   = editingRow?.dataset.id || '';\n    const city = editingRow?.dataset.city || 'this row';\n    const svc  = editingRow?.dataset.svcName || 'this service';\n    const events = window.__impactCount(id + city + svc + 'save');\n\n    window.__confirm({\n      title: 'Save changes?',\n      subtitle: `${svc} · ${city}`,\n      okText: 'Save changes',\n      body: `This change will affect <b>${events}<\u002Fb> events using this default service. Proceed?<span class=\"small\">Historical orders retain their original service data.<\u002Fspan>`,\n      meta: `Row #${id}`,\n      onConfirm: () => {\n        bypass = true;\n        saveBtn.click();\n      },\n    });\n  }, true);\n})();\n\n/* ===== Service archive (group) confirmation - already uses confirm() native; upgrade ===== */\n(function(){\n  document.querySelectorAll('[data-archive]').forEach(() => {\n    // Existing inline confirm() in handler is acceptable; not intercepted here.\n  });\n})();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
