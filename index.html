    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.

    // would push the parser into quirks mode. DOMParser always emits a <head>

"> enable sms notifications<\u002Flabel>\n          <label><input type=\"checkbox\"> enable whatsapp notifications<\u002Flabel>\n          <label><input type=\"checkbox\" checked=\"\"> enable refund guarantee<\u002Flabel>\n          <label><input type=\"checkbox\"> enable pdf tickets attachment<\u002Flabel>\n          <label><input type=\"checkbox\"> enable sms reminder<\u002Flabel>\n          <label><input type=\"checkbox\"> enable whatsapp reminder<\u002Flabel>\n          <p class=\"hint\">You cannot add new or modify existing SMS and WhatsApp notification services.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"form-row\">\n      <label class=\"lbl\">Rules engine<\u002Flabel>\n      <div class=\"ctrl\">\n        <div class=\"rules-engine\" id=\"rulesEngine\">\n          <div class=\"head\" id=\"rulesHead\">No rules defined<\u002Fdiv>\n          <div class=\"rule-list\" id=\"rulesList\"><\u002Fdiv>\n          <div class=\"rules-row\">\n            <select class=\"select\" id=\"ruleSelect\"><\u002Fselect>\n            <button class=\"btn\" id=\"ruleAdd\">+ Add rule<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"drawer-foot\">\n    <label class=\"opt\"><input type=\"checkbox\" checked=\"\"> Return to the list<\u002Flabel>\n    <button class=\"btn\" id=\"drawerReset\">Reset<\u002Fbutton>\n    <button class=\"btn\" id=\"drawerCancel\">Cancel<\u002Fbutton>\n    <button class=\"btn btn-primary\" id=\"drawerSave\">Save<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Faside>\n\n<script>\n(function(){\n  const drawer = document.getElementById('drawer');\n  const scrim = document.getElementById('scrim');\n  const fStatus = document.getElementById('f-status');\n  const fStatusLab = document.getElementById('f-status-lab');\n  fStatus.addEventListener('change', () => {\n    fStatusLab.textContent = fStatus.checked ? 'Enabled' : 'Disabled';\n  });\n\n  const rulesList = document.getElementById('rulesList');\n  const rulesHead = document.getElementById('rulesHead');\n  const ruleSelect = document.getElementById('ruleSelect');\n  const ruleAdd = document.getElementById('ruleAdd');\n\n  let activeRow = null;\n  let currentRules = [];\n\n  function refreshRuleSelect() {\n    const used = new Set(currentRules);\n    const opts = Object.entries(RULE_DEFS)\n      .filter(([k]) => !used.has(k))\n      .map(([k, def]) => `<option value=\"${k}\">${def.label}<\u002Foption>`).join('');\n    ruleSelect.innerHTML = opts || '<option value=\"\" disabled>All rules added<\u002Foption>';\n    ruleSelect.disabled = !opts;\n    ruleAdd.disabled = !opts;\n    ruleAdd.style.opacity = opts ? '1' : '0.5';\n  }\n\n  function renderRulesList() {\n    if (currentRules.length === 0) {\n      rulesList.innerHTML = '';\n      rulesHead.textContent = 'No rules defined';\n    } else {\n      rulesHead.textContent = `${currentRules.length} rule${currentRules.length === 1 ? '' : 's'} active`;\n      rulesList.innerHTML = currentRules.map((k) => {\n        const def = RULE_DEFS[k]; if (!def) return '';\n        return `<div class=\"rule-item\" data-rule=\"${k}\">\n          <span class=\"rule-tone tone-${def.tone}\"><\u002Fspan>\n          <span class=\"rule-label\">${def.label}<\u002Fspan>\n          <span class=\"rule-key\">${k}<\u002Fspan>\n          <button type=\"button\" class=\"rule-remove\" data-remove=\"${k}\" title=\"Remove rule\" aria-label=\"Remove rule\">\n            <svg width=\"11\" height=\"11\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><path d=\"M18 6 6 18M6 6l12 12\"/><\u002Fsvg>\n          <\u002Fbutton>\n        <\u002Fdiv>`;\n      }).join('');\n    }\n    refreshRuleSelect();\n  }\n\n  rulesList.addEventListener('click', (e) => {\n    const btn = e.target.closest('[data-remove]');\n    if (!btn) return;\n    const k = btn.dataset.remove;\n    currentRules = currentRules.filter((r) => r !== k);\n    renderRulesList();\n  });\n\n  ruleAdd.addEventListener('click', () => {\n    const v = ruleSelect.value;\n    if (!v || currentRules.includes(v)) return;\n    currentRules.push(v);\n    renderRulesList();\n  });\n\n  function updateFeeLocalHint() {\n    const hint = document.getElementById('f-fixed-local');\n    if (!hint || !activeRow) return;\n    const usd = parseFloat(document.getElementById('f-fixed').value || 0);\n    const cur = activeRow.dataset.currency || 'USD';\n    if (cur === 'USD' || !RATES[cur]) { hint.textContent = ''; return; }\n    const dec = fixedDecimals(cur);\n    hint.textContent = `≈ ${ceilTo(usd * RATES[cur], dec).toFixed(dec)} ${cur}`;\n  }\n  document.getElementById('f-fixed').addEventListener('input', updateFeeLocalHint);\n\n  function openDrawer(rowEl) {\n    if (activeRow) activeRow.classList.remove('editing');\n    activeRow = rowEl;\n    rowEl.classList.add('editing');\n\n    const id = rowEl.dataset.id;\n    const city = rowEl.dataset.city;\n    const svc = rowEl.dataset.svcName;\n\n    document.getElementById('drawerTitle').textContent = svc;\n    document.getElementById('drawerId').textContent = '#' + id;\n    document.getElementById('drawerScope').textContent = city;\n\n    // Populate from current row (use stashed USD value, not the displayed local-currency one)\n    if (rowEl.dataset.usdFixed) {\n      document.getElementById('f-fixed').value = parseFloat(rowEl.dataset.usdFixed).toFixed(2);\n    }\n    if (rowEl.dataset.pct) {\n      document.getElementById('f-pct').value = parseFloat(rowEl.dataset.pct).toFixed(2);\n    }\n    updateFeeLocalHint();\n    const dot = rowEl.querySelector('.col-status .dot');\n    fStatus.checked = dot && dot.classList.contains('green');\n    fStatusLab.textContent = fStatus.checked ? 'Enabled' : 'Disabled';\n\n    const def = rowEl.querySelector('.default-tag')?.className.match(/(checked|unchecked|required)/)?.[1] || 'checked';\n    document.querySelectorAll('input[name=\"defv\"]').forEach((r) => { r.checked = (r.value === def); });\n\n    document.getElementById('f-name-en').value = svc;\n    const cityOpt = document.getElementById('f-city');\n    cityOpt.innerHTML = `<option>${city}<\u002Foption>`;\n\n    // Load rules from row dataset\n    try { currentRules = JSON.parse(rowEl.dataset.rules || '[]'); }\n    catch { currentRules = []; }\n    renderRulesList();\n\n    drawer.classList.add('on');\n    drawer.setAttribute('aria-hidden', 'false');\n    scrim.classList.add('on');\n  }\n\n  function closeDrawer() {\n    drawer.classList.remove('on');\n    drawer.setAttribute('aria-hidden', 'true');\n    scrim.classList.remove('on');\n    if (activeRow) activeRow.classList.remove('editing');\n    activeRow = null;\n  }\n\n  document.getElementById('tbody').addEventListener('click', (e) => {\n    const btn = e.target.closest('[data-edit]');\n    if (!btn) return;\n    e.stopPropagation();\n    const row = btn.closest('tr.row');\n    if (row) openDrawer(row);\n  });\n\n  document.getElementById('drawerClose').addEventListener('click', closeDrawer);\n  document.getElementById('drawerCancel').addEventListener('click', closeDrawer);\n  scrim.addEventListener('click', closeDrawer);\n  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeDrawer(); });\n\n  document.getElementById('drawerSave').addEventListener('click', () => {\n    if (!activeRow) return;\n    const fixed = parseFloat(document.getElementById('f-fixed').value || 0);\n    const pct = parseFloat(document.getElementById('f-pct').value || 0).toFixed(2);\n    const status = fStatus.checked ? 'green' : 'red';\n    const defv = document.querySelector('input[name=\"defv\"]:checked')?.value || 'checked';\n\n    // Persist new USD fixed value on the row\n    activeRow.dataset.usdFixed = fixed.toFixed(4);\n    activeRow.dataset.pct = pct;\n\n    const rowCur = activeRow.dataset.currency || 'USD';\n    const dec = fixedDecimals(rowCur);\n    const localFixedStr = ceilTo(fixed * (RATES[rowCur] ?? 1), dec).toFixed(dec);\n    const localPart = rowCur !== 'USD'\n      ? `<span class=\"val-local\">(<span class=\"num-local\">${localFixedStr}<\u002Fspan><span class=\"cur-local\">${rowCur}<\u002Fspan>)<\u002Fspan>`\n      : '';\n\n    const vCell = activeRow.querySelector('.col-value');\n    vCell.innerHTML = `<span class=\"val mono\">\n      <span class=\"num accent-blue\">${fixed.toFixed(2)}<\u002Fspan><span class=\"cur\">USD<\u002Fspan>${localPart}\n      <span class=\"op\">+<\u002Fspan>\n      <span class=\"num accent-green\">${pct}<\u002Fspan>\n      <span class=\"pct\">%<\u002Fspan>\n    <\u002Fspan>`;\n    vCell.classList.remove('flash'); void vCell.offsetWidth; vCell.classList.add('flash');\n\n    const sCell = activeRow.querySelector('.col-status');\n    sCell.innerHTML = `<button class=\"status-toggle\" type=\"button\" data-status-toggle title=\"Click to toggle status\" aria-label=\"Toggle status\"><span class=\"dot ${status}\"><\u002Fspan><\u002Fbutton>`;\n    sCell.classList.remove('flash'); void sCell.offsetWidth; sCell.classList.add('flash');\n\n    const dCell = activeRow.querySelector('.col-default');\n    dCell.innerHTML = renderDefaultTag(defv);\n    dCell.classList.remove('flash'); void dCell.offsetWidth; dCell.classList.add('flash');\n\n    // Persist rules back to row dataset (used next time drawer opens)\n    activeRow.dataset.rules = JSON.stringify(currentRules);\n\n    closeDrawer();\n  });\n})();\n<\u002Fscript>\n\n<!-- New service modal -->\n<div class=\"modal\" id=\"newSvcModal\" role=\"dialog\" aria-modal=\"true\" aria-hidden=\"true\">\n  <div class=\"modal-head\">\n    <div>\n      <h2>New service<\u002Fh2>\n      <div class=\"sub\">Create a new service and select where it should be available.<\u002Fdiv>\n    <\u002Fdiv>\n    <button class=\"drawer-close\" id=\"modalClose\" style=\"margin-left:auto;\" title=\"Close\">\n      <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\"><path d \u002Flabel>\n      <div class=\"ctrl\">\n        <div class=\"grid-2\">\n          <div class=\"picker\">\n            <div class=\"picker-head\">\n              Countries\n              <span><a id=\"ns-countries-all\">All<\u002Fa> · <a id=\"ns-countries-none\">None<\u002Fa><\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"picker-search\">\n              <input type=\"text\" id=\"ns-country-search\" placeholder=\"Search countries…\">\n            <\u002Fdiv>\n            <div class=\"picker-list\" id=\"ns-country-list\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"picker\">\n            <div class=\"picker-head\">\n              Cities <span id=\"ns-cities-summary\" style=\"text-transform:none;letter-spacing:0;color:var(--text-dim);font-weight:400;font-size:11px;\"><\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"picker-search\">\n              <input type=\"text\" id=\"ns-city-search\" placeholder=\"Search cities…\">\n            <\u002Fdiv>\n            <div class=\"picker-list\" id=\"ns-city-list\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"hint\" style=\"margin-top:6px;\">Cities shown belong only to selected countries.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"modal-foot\">\n    <span class=\"meta\">Will create <b id=\"ns-summary\">0 cities<\u002Fb><\u002Fspan>\n    <button class=\"btn\" id=\"ns-cancel\">Cancel<\u002Fbutton>\n    <button class=\"btn btn-primary\" id=\"ns-create\">Create service<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Generic confirmation modal (save / delete) -->\n<div class=\"modal confirm\" id=\"confirmModal\" role=\"dialog\" aria-modal=\"true\" aria-hidden=\"true\">\n  <div class=\"modal-head\">\n    <div>\n      <h2 id=\"confirmTitle\">Confirm<\u002Fh2>\n      <div class=\"sub\" id=\"confirmSub\"><\u002Fdiv>\n    <\u002Fdiv>\n    <button class=\"drawer-close\" id=\"confirmCloseBtn\" style=\"margin-left:auto;\" title=\"Close\">\n      <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\"><path d=\"M18 6 6 18M6 6l12 12\"><\u002Fpath><\u002Fsvg>\n    <\u002Fbutton>\n  <\u002Fdiv>\n  <div class=\"modal-body\">\n    <div class=\"impact\">\n      <span class=\"ic\" id=\"confirmIcon\">!<\u002Fspan>\n      <div id=\"confirmBody\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"modal-foot\">\n    <span class=\"meta\" id=\"confirmMeta\"><\u002Fspan>\n    <button class=\"btn\" id=\"confirmCancel\">Cancel<\u002Fbutton>\n    <button class=\"btn btn-primary\" id=\"confirmOk\">Proceed<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Flag SVGs (inline templates) -->\n<svg width=\"0\" height=\"0\" style=\"position:absolute\" aria-hidden=\"true\">\n  <defs>\n    <symbol id=\"flag-sa\" viewBox=\"0 0 18 13\"><rect width=\"18\" height=\"13\" fill=\"#006c35\"><\u002Frect><rect x=\"3\" y=\"5.5\" width=\"12\" height=\"1\" fill=\"#fff\"><\u002Frect><rect x=\"3\" y=\"7.5\" width=\"12\" height=\"0.6\" fill=\"#fff\"><\u002Frect><\u002Fsymbol>\n    <symbol id=\"flag-ae\" viewBox=\"0 0 18 13\"><rect width=\"18\" height=\"13\" fill=\"#fff\"><\u002Frect><rect width=\"4.5\" height=\"13\" fill=\"#ff0000\"><\u002Frect><rect x=\"4.5\" width=\"13.5\" height=\"4.33\" fill=\"#00732f\"><\u002Frect><rect x=\"4.5\" y=\"4.33\" width=\"13.5\" height=\"4.34\" fill=\"#fff\"><\u002Frect><rect x=\"4.5\" y=\"8.67\" width=\"13.5\" height=\"4.33\" fill=\"#000\"><\u002Frect><\u002Fsymbol>\n    <symbol id=\"flag-ph\" viewBox=\"0 0 18 13\"><rect width=\"18\" height=\"13\" fill=\"#0038a8\"><\u002Frect><rect y=\"6.5\" width=\"18\" height=\"6.5\" fill=\"#ce1126\"><\u002Frect><polygon points=\"0,0 8,6.5 0,13\" fill=\"#fff\"><\u002Fpolygon><\u002Fsymbol>\n    <symbol id=\"flag-th\" viewBox=\"0 0 18 13\"><rect width=\"18\" height=\"13\" fill=\"#a51931\"><\u002Frect><rect y=\"2.6\" width=\"18\" height=\"7.8\" fill=\"#f4f5f8\"><\u002Frect><rect y=\"4.55\" width=\"18\" height=\"3.9\" fill=\"#2d2a4a\"><\u002Frect><\u002Fsymbol>\n    <symbol id=\"flag-bh\" viewBox=\"0 0 18 13\"><rect width=\"18\" height=\"13\" fill=\"#fff\"><\u002Frect><path d=\"M18 0H6l-2 1.3 2 1.3-2 1.3 2 1.3-2 1.3 2 1.3-2 1.3 2 1.3-2 1.3 2 1.3-2 1.3h12z\" fill=\"#ce1126\"><\u002Fpath><\u002Fsymbol>\n    <symbol id=\"flag-om\" viewBox=\"0 0 18 13\"><rect width=\"18\" height=\"13\" fill=\"#fff\"><\u002Frect><rect width=\"18\" height=\"4.33\" fill=\"#db161b\"><\u002Frect><rect y=\"8.66\" width=\"18\" height=\"4.34\" fill=\"#11804a\"><\u002Frect><rect width=\"5\" height=\"13\" fill=\"#db161b\"><\u002Frect><\u002Fsymbol>\n  <\u002Fdefs>\n<\u002Fsvg>\n\n<script>\n/* ───── Currency rates (USD → local) ───── */\nconst RATES = { USD: 1, AED: 3.6725, SAR: 3.75, OMR: 0.385, BHD: 0.376 };\nfunction ceilTo(n, decimals) {\n  const f = Math.pow(10, decimals);\n  return Math.ceil(n * f) / f;\n}\nfunction fixedDecimals(cur) {\n  return (cur === 'OMR' || cur === 'BHD') ? 3 : 2;\n}\nfunction convertUsdFixedToLocal(usdAmount, currency) {\n  const rate = RATES[currency] ?? 1;\n  const local = usdAmount * rate;\n  const dec = fixedDecimals(currency);\n  return ceilTo(local, dec).toFixed(dec);\n}\n\n/* ───── Data ───── */\nconst data = [\n  {\n    service: 'Refund Guarantee', usdFixed: 0,\n    countries: [\n      {\n        name: 'Saudi Arabia', flag: 'flag-sa', currency: 'SAR',\n        cities: [\n          { id: 24, city: 'Riyadh',    value: '0.00 + 8.00 %', status: 'green', def: 'checked', rules: [] },\n          { id: 25, city: 'Jeddah',    value: '0.00 + 8.00 %', status: 'green', def: 'checked', rules: [] },\n          { id: 26, city: 'Abha',      value: '0.00 + 8.00 %', status: 'green', def: 'checked', rules: [] },\n          { id: 27, city: 'Al Ahsa',   value: '0.00 + 8.00 %', status: 'green', def: 'checked', rules: [] },\n          { id: 28, city: 'Dhahran',   value: '0.00 + 8.00 %', status: 'green', def: 'checked', rules: [] },\n          { id: 29, city: 'Al Jubail', value: '0.00 + 8.00 %', status: 'green', def: 'checked', rules: [], active: true },\n          { id: 30, city: 'Dammam',    value: '0.00 + 8.00 %', status: 'green', def: 'checked', rules: [] },\n          { id: 31, city: 'Khobar',    value: '0.00 + 8.00 %', status: 'green', def: 'checked', rules: [] },\n          { id: 32, city: 'Taif',      value: '0.00 + 8.00 %', status: 'green', def: 'checked', rules: [] },\n        ]\n      },\n      {\n        name: 'United Arab Emirates', flag: 'flag-ae', currency: 'AED',\n        cities: [\n          { id: 1,  city: 'Dubai',     value: '0.00 + 8.00 %', status: 'green', def: 'checked', rules: [] },\n          { id: 33, city: 'Abu Dhabi', value: '0.00 + 8.00 %', status: 'green', def: 'checked', rules: [] },\n          { id: 34, city: 'Sharjah',   value: '0.00 + 8.00 %', status: 'green', def: 'checked', rules: [] },\n          { id: 35, city: 'Ajman',     value: '0.00 + 8.00 %', status: 'green', def: 'checked', rules: [] },\n          { id: 36, city: 'Al Ain',    value: '0.00 + 8.00 %', status: 'green', def: 'checked', rules: [] },\n          { id: 37, city: 'RAK',       value: '0.00 + 8.00 %', status: 'green', def: 'checked', rules: [] },\n          { id: 38, city: 'UAQ',       value: '0.00 + 8.00 %', status: 'green', def: 'checked', rules: [] },\n          { id: 39, city: 'Fujairah',  value: '0.00 + 8.00 %', status: 'green', def: 'checked', rules: [] },\n        ]\n      },\n      {\n        name: 'Oman', flag: 'flag-om', currency: 'OMR',\n        cities: [\n          { id: 67, city: 'Muscat', value: '0.00 + 8.00 %', status: 'green', def: 'checked', rules: [] },\n        ]\n      },\n    ]\n  },\n  {\n    service: 'Send me tickets via WhatsApp', usdFixed: 0.5445,\n    countries: [\n      {\n        name: 'United Arab Emirates', flag: 'flag-ae', currency: 'AED',\n        cities: [\n          { id: 59, city: 'Dubai',     value: '0.5445 + 0.00 %', status: 'green', def: 'checked', rules: [] },\n          { id: 60, city: 'Abu Dhabi', value: '0.5445 + 0.00 %', status: 'green', def: 'checked', rules: [] },\n          { id: 61, city: 'Sharjah',   value: '0.5445 + 0.00 %', status: 'green', def: 'checked', rules: [] },\n          { id: 62, city: 'Ajman',     value: '0.5445 + 0.00 %', status: 'green', def: 'checked', rules: [] },\n          { id: 65, city: 'Al Ain',    value: '0.5445 + 0.00 %', status: 'green', def: 'checked', rules: [] },\n        ]\n      },\n      {\n        name: 'Oman', flag: 'flag-om', currency: 'OMR',\n        cities: [\n          { id: 68, city: 'Muscat', value: '0.5445 + 0.00 %', status: 'green', def: 'checked', rules: [] },\n        ]\n      }\n    ]\n  },\n  {\n    service: 'WhatsApp Reminder', usdFixed: 0.5445,\n    countries: [\n      {\n        name: 'United Arab Emirates', flag: 'flag-ae', currency: 'AED',\n        cities: [\n          { id: 74, city: 'Dubai',     value: '0.5445 + 0.00 %', status: 'green', def: 'checked', rules: [] },\n          { id: 78, city: 'Abu Dhabi', value: '1.0890 + 0.00 %', status: 'green', def: 'checked', rules: [] },\n        ]\n      },\n      {\n        name: 'Saudi Arabia', flag: 'flag-sa', currency: 'SAR',\n        cities: [\n          { id: 76, city: 'Riyadh', value: '1.0890 + 0.00 %', status: 'green', def: 'checked', rules: [] },\n          { id: 82, city: 'Jeddah', value: '0.5445 + 0.00 %', status: 'green', def: 'checked', rules: [] },\n        ]\n      },\n      {\n        name: 'Bahrain', flag: 'flag-bh', currency: 'BHD',\n        cities: [\n          { id: 80, city: 'Manama', value: '0.5445 + 0.00 %', status: 'green', def: 'checked', rules: ['country_phone', 'not_external_pay'] },\n        ]\n      }\n    ]\n  }\n];\n\n/* ───── Render ───── */\nconst tbody = document.getElementById('tbody');\n\n/* Rule definitions — all 11 supported rule types */\nconst RULE_DEFS = {\n  min_show:        { label: 'Minutes to show',                 short: 'Minutes to show',     tone: 'blue' },\n  not_organiser:   { label: 'Not for organiser',               short: 'Not for organiser',   tone: 'red' },\n  not_external_pay:{ label: 'Not for external payment',        short: 'No external pay',     tone: 'red' },\n  queueit_size:    { label: 'QueueIt waiting room size',       short: 'QueueIt size',        tone: 'amber' },\n  not_guest:       { label: 'Not for guest',                   short: 'Not for guest',       tone: 'red' },\n  country_phone:   { label: 'For country by user’s phone number', short: 'Country by phone', tone: 'blue' },\n  for_scope:       { label: 'For scope',                       short: 'For scope',           tone: 'blue' },\n  for_mobile:      { label: 'For mobile tickets',              short: 'For mobile',          tone: 'blue' },\n  not_mobile:      { label: 'Not for mobile tickets',          short: 'Not for mobile',      tone: 'red' },\n  for_resale:      { label: 'For resale',                      short: 'For resale',          tone: 'blue' },\n  not_resale:      { label: 'Not for resale',                  short: 'Not for resale',      tone: 'red' },\n};\n\nfunction rulesArr(r) {\n  if (!r) return [];\n  if (Array.isArray(r)) return r;\n  return [];\n}\n\nfunction rulesSig(r) {\n  return rulesArr(r).slice().sort().join(',');\n}\n\nfunction renderRulesChips(rules, opts = {}) {\n  const arr = rulesArr(rules);\n  if (arr.length === 0) {\n    return `<span class=\"cfg-chip rules-none\">No rules<\u002Fspan>`;\n  }\n  const max = opts.max ?? 3;\n  const visible = arr.slice(0, max);\n  const overflow = arr.length - visible.length;\n  const chips = visible.map((r) => {\n    const def = RULE_DEFS[r];\n    if (!def) return `<span class=\"cfg-chip rule-chip tone-mute\">${r}<\u002Fspan>`;\n    return `<span class=\"cfg-chip rule-chip tone-${def.tone}\" title=\"${def.label}\">${def.short}<\u002Fspan>`;\n  }).join('');\n  const more = overflow > 0\n    ? `<span class=\"cfg-chip rule-chip tone-mute\" title=\"${arr.slice(max).map(r => RULE_DEFS[r]?.label || r).join(', ')}\">+${overflow}<\u002Fspan>`\n    : '';\n  return chips + more;\n}\n\nfunction renderDefaultTag(state) {\n  // state ∈ 'checked' | 'unchecked' | 'required'\n  const cls = state === 'unchecked' ? 'unchecked' : state === 'required' ? 'required' : 'checked';\n  let icon, label;\n  if (cls === 'checked') {\n    icon = '<svg width=\"10\" height=\"10\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\"><path d=\"M20 6 9 17l-5-5\"/><\u002Fsvg>';\n    label = 'Checked';\n  } else if (cls === 'unchecked') {\n    icon = '<svg width=\"10\" height=\"10\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\"><path d=\"M18 6 6 18M6 6l12 12\"/><\u002Fsvg>';\n    label = 'Unchecked';\n  } else {\n    icon = '<svg width=\"10\" height=\"10\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\"><path d=\"M12 4v16M4.93 7.05l14.14 9.9M4.93 16.95l14.14-9.9\"/><\u002Fsvg>';\n    label = 'Required';\n  }\n  return `<span class=\"default-tag ${cls}\">${icon} ${label}<\u002Fspan>`;\n}\n\n\n\nfunction renderValue(v, currency) {\n  const m = v.match(/^([\\d.]+)\\s*\\+\\s*([\\d.]+)\\s*%$/);\n  if (!m) return v;\n  const usdFixed = parseFloat(m[1]);\n  const cur = currency || 'USD';\n  const dec = fixedDecimals(cur);\n  const usdStr = usdFixed.toFixed(2);\n  const localFixed = ceilTo(usdFixed * (RATES[cur] ?? 1), dec).toFixed(dec);\n  const localPart = cur && cur !== 'USD'\n    ? `<span class=\"val-local\">(<span class=\"num-local\">${localFixed}<\u002Fspan><span class=\"cur-local\">${cur}<\u002Fspan>)<\u002Fspan>`\n    : '';\n  return `<span class=\"val mono\">\n    <span class=\"num accent-blue\">${usdStr}<\u002Fspan><span class=\"cur\">USD<\u002Fspan>${localPart}\n    <span class=\"op\">+<\u002Fspan>\n    <span class=\"num accent-green\">${m[2]}<\u002Fspan>\n    <span class=\"pct\">%<\u002Fspan>\n  <\u002Fspan>`;\n}\n\nfunction chev() {\n  return `<span class=\"chev\">\n    <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" width=\"14\" height=\"14\">\n      <path d=\"m6 9 6 6 6-6\"><\u002Fpath>\n    <\u002Fsvg>\n  <\u002Fspan>`;\n}\n\nlet svcIdx = 0, cIdx = 0, cfgIdx = 0;\ndata.forEach((svc) => {\n  const totalCities = svc.countries.reduce((n, c) => n + c.cities.length, 0);\n  const totalActive = svc.countries.reduce((n, c) => n + c.cities.filter(x => x.status === 'green').length, 0);\n  const sId = `svc-${svcIdx++}`;\n\n  // Count distinct configs across the whole service (for the header summary)\n  const svcConfigSet = new Set();\n  svc.countries.forEach((c) => c.cities.forEach((city) => {\n    svcConfigSet.add(`${city.value}|${city.def}|${rulesSig(city.rules)}`);\n  }));\n  const totalConfigs = svcConfigSet.size;\n\n  // Service group row (column-aligned)\n  const trS = document.createElement('tr');\n  trS.className = 'grp grp-service';\n  trS.dataset.group = sId;\n  trS.innerHTML = `\n    <td class=\"col-chk\"><input type=\"checkbox\" class=\"chk\" data-grp=\"${sId}\" /><\u002Ftd>\n    <td colspan=\"2\">\n      <span class=\"grp-label\">\n        ${chev()}\n        <span class=\"badge-service\">\n          <svg width=\"11\" height=\"11\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><path d=\"M12 2 4 6v6c0 5 3.5 9 8 10 4.5-1 8-5 8-10V6l-8-4Z\"/><\u002Fsvg>\n          Service\n        <\u002Fspan>\n        ${svc.service}\n        <span class=\"count\">· ${totalConfigs} ${totalConfigs === 1 ? 'config' : 'configs'} · ${svc.countries.length} countries · ${totalCities} cities · ${totalActive} active<\u002Fspan>\n      <\u002Fspan>\n    <\u002Ftd>\n    <td colspan=\"3\" class=\"grp-meta-cell\">\n      <span class=\"grp-actions\">\n        <button class=\"icobtn primary\" data-bulk=\"${sId}\" data-scope=\"service\" title=\"Apply values to all cities in this service\">\n          <svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\"><path d=\"M3 17V7a2 2 0 0 1 2-2h6\"/><path d=\"m9 17-6 0\"/><path d=\"m15 5 6 6-9 9H6v-6Z\"/><\u002Fsvg>\n          Bulk edit\n        <\u002Fbutton>\n        <button class=\"icobtn danger\" data-archive=\"${sId}\" title=\"Delete this service\">\n          <svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\"><path d=\"M3 6h18\"/><path d=\"M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2\"/><path d=\"M19 6 18 20a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6\"/><path d=\"M10 11v6M14 11v6\"/><\u002Fsvg>\n          Delete\n        <\u002Fbutton>\n      <\u002Fspan>\n    <\u002Ftd>\n    <td class=\"col-edit\"><\u002Ftd>\n  `;\n  tbody.appendChild(trS);\n\n  // Service-level baseline row — appears only when all cities across all countries share the same config\n  if (totalConfigs === 1) {\n    // Pick first city to read the shared params\n    const sampleCity = svc.countries[0].cities[0];\n    const sampleCountry = svc.countries[0];\n    const baselineId = `${sId}-svcbase`;\n    const m = sampleCity.value.match(/^([\\d.]+)\\s*\\+\\s*([\\d.]+)\\s*%$/);\n    const usdFixedSvc = m ? parseFloat(m[1]).toFixed(2) : null;\n    const localPartSvc = m\n      ? (() => {\n          // Single-currency service → show local in parens. Multi-currency → omit (noisy).\n          const allCurs = new Set(svc.countries.map((c) => c.currency || 'USD'));\n          if (allCurs.size === 1) {\n            const cur = [...allCurs][0];\n            if (cur === 'USD') return '';\n            const dec = fixedDecimals(cur);\n            const lf = ceilTo(parseFloat(m[1]) * (RATES[cur] ?? 1), dec).toFixed(dec);\n            return `<span class=\"val-local\">(<span class=\"num-local\">${lf}<\u002Fspan><span class=\"cur-local\">${cur}<\u002Fspan>)<\u002Fspan>`;\n          }\n          return '';\n        })()\n      : '';\n    const valHtmlSvc = m\n      ? `<span class=\"cfg-val mono\"><span class=\"num accent-blue\">${usdFixedSvc}<\u002Fspan><span class=\"cur\">USD<\u002Fspan>${localPartSvc}<span class=\"op\">+<\u002Fspan><span class=\"num accent-green\">${m[2]}<\u002Fspan><span class=\"pct\">%<\u002Fspan><\u002Fspan>`\n      : `<span class=\"cfg-val mono\">${sampleCity.value}<\u002Fspan>`;\n    const defChipSvc = sampleCity.def === 'checked'\n      ? `<span class=\"cfg-chip def-on\"><svg width=\"9\" height=\"9\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\"><path d=\"M20 6 9 17l-5-5\"/><\u002Fsvg> Checked<\u002Fspan>`\n      : sampleCity.def === 'required'\n      ? `<span class=\"cfg-chip def-req\">! Required<\u002Fspan>`\n      : `<span class=\"cfg-chip def-off\">✕ Unchecked<\u002Fspan>`;\n    const rulesChipsSvc = renderRulesChips(sampleCity.rules, { max: 4 });\n    const trSvcBase = document.createElement('tr');\n    trSvcBase.className = 'grp grp-config is-baseline is-service-baseline';\n    trSvcBase.dataset.parent = sId;\n    trSvcBase.dataset.group = baselineId;\n    trSvcBase.innerHTML = `\n      <td class=\"col-chk\"><input type=\"checkbox\" class=\"chk\" data-grp=\"${baselineId}\" /><\u002Ftd>\n      <td class=\"cfg-id-cell\"><\u002Ftd>\n      <td class=\"cfg-name-cell\">\n        <span class=\"grp-label\">\n          <span class=\"cfg-label-text\"><span class=\"cfg-badge baseline\">Same for all cities<\u002Fspan><\u002Fspan>\n          <span class=\"cfg-rules\">${rulesChipsSvc}<\u002Fspan>\n          <span class=\"count\">· ${totalCities} ${totalCities === 1 ? 'city' : 'cities'} across ${svc.countries.length} ${svc.countries.length === 1 ? 'country' : 'countries'}<\u002Fspan>\n        <\u002Fspan>\n      <\u002Ftd>\n      <td class=\"col-value\">${valHtmlSvc}<\u002Ftd>\n      <td class=\"col-status\"><\u002Ftd>\n      <td class=\"col-default\">${defChipSvc}<\u002Ftd>\n      <td class=\"col-edit\">\n        <button class=\"icobtn cfg-bulk\" data-bulk=\"${sId}\" data-scope=\"service\" title=\"Edit baseline for the whole service\">\n          <svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\"><path d=\"M3 17V7a2 2 0 0 1 2-2h6\"/><path d=\"m9 17-6 0\"/><path d=\"m15 5 6 6-9 9H6v-6Z\"/><\u002Fsvg>\n        <\u002Fbutton>\n      <\u002Ftd>\n    `;\n    tbody.appendChild(trSvcBase);\n  }\n\n  // For each country, group its cities by config signature, then render\n  svc.countries.forEach((country) => {\n    const cId = `${sId}-c${cIdx++}`;\n\n    // Group this country's cities by config signature\n    const cfgMap = new Map();\n    country.cities.forEach((city) => {\n      const sig = `${city.value}|${city.def}|${rulesSig(city.rules)}`;\n      if (!cfgMap.has(sig)) {\n        cfgMap.set(sig, {\n          value: city.value, def: city.def, rules: rulesArr(city.rules), cities: [],\n        });\n      }\n      cfgMap.get(sig).cities.push(city);\n    });\n    const sortedCfgs = [...cfgMap.values()].sort((a, b) => b.cities.length - a.cities.length);\n\n    // Country group row (column-aligned)\n    const trC = document.createElement('tr');\n    trC.className = 'grp grp-country';\n    trC.dataset.parent = sId;\n    trC.dataset.group = cId;\n    trC.innerHTML = `\n      <td class=\"col-chk\"><input type=\"checkbox\" class=\"chk\" data-grp=\"${cId}\" /><\u002Ftd>\n      <td colspan=\"2\">\n        <span class=\"grp-label\">\n          ${chev()}\n          <span class=\"flag\"><svg width=\"18\" height=\"13\"><use href=\"#${country.flag}\"/><\u002Fsvg><\u002Fspan>\n          <span>${country.name}<\u002Fspan>\n          <span class=\"count\">· ${sortedCfgs.length} ${sortedCfgs.length === 1 ? 'config' : 'configs'} · ${country.cities.length} cities<\u002Fspan>\n        <\u002Fspan>\n      <\u002Ftd>\n      <td colspan=\"3\" class=\"grp-meta-cell\">\n        <span class=\"grp-actions\">\n          <button class=\"icobtn\" data-bulk=\"${cId}\" data-scope=\"country\" title=\"Apply values to all cities in this country\">\n            <svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\"><path d=\"M3 17V7a2 2 0 0 1 2-2h6\"/><path d=\"m9 17-6 0\"/><path d=\"m15 5 6 6-9 9H6v-6Z\"/><\u002Fsvg>\n            Bulk edit\n          <\u002Fbutton>\n        <\u002Fspan>\n      <\u002Ftd>\n      <td class=\"col-edit\"><\u002Ftd>\n    `;\n    tbody.appendChild(trC);\n\n    // Render each config subgroup inside this country\n    const baselineCfg = sortedCfgs[0]; // most-common = country baseline\n    sortedCfgs.forEach((cfg, cfgIndex) => {\n      const isBaseline = cfg === baselineCfg;\n      const cfgId = `${cId}-cfg${cfgIdx++}`;\n      const m = cfg.value.match(/^([\\d.]+)\\s*\\+\\s*([\\d.]+)\\s*%$/);\n      const cur = country.currency || 'USD';\n      const dec = fixedDecimals(cur);\n      const usdFixedCfg = m ? parseFloat(m[1]).toFixed(2) : null;\n      const localFixedCfg = m ? ceilTo(parseFloat(m[1]) * (RATES[cur] ?? 1), dec).toFixed(dec) : null;\n      const localPartCfg = m && cur !== 'USD'\n        ? `<span class=\"val-local\">(<span class=\"num-local\">${localFixedCfg}<\u002Fspan><span class=\"cur-local\">${cur}<\u002Fspan>)<\u002Fspan>`\n        : '';\n      const valHtml = m\n        ? `<span class=\"cfg-val mono\"><span class=\"num accent-blue\">${usdFixedCfg}<\u002Fspan><span class=\"cur\">USD<\u002Fspan>${localPartCfg}<span class=\"op\">+<\u002Fspan><span class=\"num accent-green\">${m[2]}<\u002Fspan><span class=\"pct\">%<\u002Fspan><\u002Fspan>`\n        : `<span class=\"cfg-val mono\">${cfg.value}<\u002Fspan>`;\n      const defChip = cfg.def === 'checked'\n        ? `<span class=\"cfg-chip def-on\"><svg width=\"9\" height=\"9\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\"><path d=\"M20 6 9 17l-5-5\"/><\u002Fsvg> Checked<\u002Fspan>`\n        : cfg.def === 'required'\n          ? `<span class=\"cfg-chip def-req\"><svg width=\"9\" height=\"9\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\"><path d=\"M12 4v16M4.93 7.05l14.14 9.9M4.93 16.95l14.14-9.9\"/><\u002Fsvg> Required<\u002Fspan>`\n          : `<span class=\"cfg-chip def-off\"><svg width=\"9\" height=\"9\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\"><path d=\"M18 6 6 18M6 6l12 12\"/><\u002Fsvg> Unchecked<\u002Fspan>`;\n      const rulesChips = renderRulesChips(cfg.rules, { max: 4 });\n\n      // Compute diff vs baseline\n      const diffs = [];\n      if (!isBaseline) {\n        if (cfg.value !== baselineCfg.value) diffs.push('value');\n        if (cfg.def !== baselineCfg.def) diffs.push('default');\n        if (rulesSig(cfg.rules) !== rulesSig(baselineCfg.rules)) diffs.push('rules');\n      }\n\n      // If this country has only one config, skip the subgroup row entirely\n      // and render the cities directly under the country header.\n      const hasSubgroupRow = sortedCfgs.length > 1;\n      let cityParent = cId;\n\n      if (hasSubgroupRow) {\n        cityParent = cfgId;\n        const trCfg = document.createElement('tr');\n        trCfg.className = 'grp grp-config' + (isBaseline ? ' is-baseline' : ' is-variant');\n        trCfg.dataset.parent = cId;\n        trCfg.dataset.svc = sId;\n        trCfg.dataset.group = cfgId;\n        const labelText = isBaseline\n          ? `<span class=\"cfg-label-text\"><span class=\"cfg-badge baseline\">Country baseline<\u002Fspan><\u002Fspan>`\n          : `<span class=\"cfg-label-text\">\n              <span class=\"cfg-badge variant\">Variant<\u002Fspan>\n              <span class=\"cfg-diffs\" title=\"Differs from baseline in: ${diffs.join(', ')}\">\n                differs in: ${diffs.map(d => `<span class=\"cfg-diff-tok\">${d}<\u002Fspan>`).join('')}\n              <\u002Fspan>\n            <\u002Fspan>`;\n        trCfg.innerHTML = `\n          <td class=\"col-chk\"><input type=\"checkbox\" class=\"chk\" data-grp=\"${cfgId}\" /><\u002Ftd>\n          <td class=\"cfg-id-cell\"><\u002Ftd>\n          <td class=\"cfg-name-cell\">\n            <span class=\"grp-label\">\n              ${chev()}\n              ${labelText}\n              <span class=\"cfg-rules\">${rulesChips}<\u002Fspan>\n              <span class=\"count\">· ${cfg.cities.length} ${cfg.cities.length === 1 ? 'city' : 'cities'}<\u002Fspan>\n            <\u002Fspan>\n          <\u002Ftd>\n          <td class=\"col-value\">${valHtml}<\u002Ftd>\n          <td class=\"col-status\"><\u002Ftd>\n          <td class=\"col-default\">${defChip}<\u002Ftd>\n          <td class=\"col-edit\">\n            <button class=\"icobtn cfg-bulk\" data-bulk=\"${cfgId}\" data-scope=\"config\" title=\"Apply values to every city sharing this configuration\">\n              <svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\"><path d=\"M3 17V7a2 2 0 0 1 2-2h6\"/><path d=\"m9 17-6 0\"/><path d=\"m15 5 6 6-9 9H6v-6Z\"/><\u002Fsvg>\n            <\u002Fbutton>\n          <\u002Ftd>\n        `;\n        tbody.appendChild(trCfg);\n      }\n\n      // Sort cities by name within this config bucket\n      const sortedCities = [...cfg.cities].sort((a, b) => a.city.localeCompare(b.city));\n      sortedCities.forEach((row) => {\n        const tr = document.createElement('tr');\n        tr.className = 'row' + (row.active ? ' active' : '') + (hasSubgroupRow && !isBaseline ? ' is-variant-row' : '');\n        tr.dataset.parent = cityParent;\n        tr.dataset.country = cId;\n        tr.dataset.svc = sId;\n        if (hasSubgroupRow) tr.dataset.config = cfgId;\n        tr.innerHTML = `\n          <td class=\"col-chk\"><input type=\"checkbox\" class=\"chk row-chk\" /><\u002Ftd>\n          <td class=\"id mono\">${row.id}<\u002Ftd>\n          <td>\n            <span class=\"city-cell\">\n              <span class=\"city\">${row.city}<\u002Fspan>\n            <\u002Fspan>\n          <\u002Ftd>\n          <td class=\"col-value\">${renderValue(row.value, country.currency)}<\u002Ftd>\n          <td class=\"col-status\"><button class=\"status-toggle\" type=\"button\" data-status-toggle title=\"Click to toggle status\" aria-label=\"Toggle status\"><span class=\"dot ${row.status}\"><\u002Fspan><\u002Fbutton><\u002Ftd>\n          <td class=\"col-default\">${renderDefaultTag(row.def)}<\u002Ftd>\n          <td class=\"col-edit\">\n            <button class=\"row-edit\" title=\"Edit row\" data-edit=\"${row.id}\">\n              <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M12 20h9\"/><path d=\"M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z\"/><\u002Fsvg>\n            <\u002Fbutton><button class=\"row-del\" title=\"Delete row\" data-del=\"${row.id}\">\n              <svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\"><path d=\"M18 6 6 18M6 6l12 12\"/><\u002Fsvg>\n            <\u002Fbutton>\n          <\u002Ftd>\n        `;\n        tr.dataset.svcName = svc.service;\n        tr.dataset.city = row.city;\n        tr.dataset.countryName = country.name;\n        tr.dataset.flag = country.flag;\n        tr.dataset.currency = country.currency || 'USD';\n        // Stash underlying USD value for bulk-edit pre-fill\n        const _vm = (row.value || '').match(/^([\\d.]+)\\s*\\+\\s*([\\d.]+)\\s*%$/);\n        if (_vm) { tr.dataset.usdFixed = _vm[1]; tr.dataset.pct = _vm[2]; }\n        tr.dataset.id = row.id;\n        tr.dataset.rules = JSON.stringify(rulesArr(row.rules));\n        tbody.appendChild(tr);\n      });\n    });\n  });\n});\n\n/* ───── Group expand/collapse ───── */\ntbody.addEventListener('click', (e) => {\n  // Don't toggle when clicking checkbox or bulk button\n  if (e.target.matches('input,label,svg use')) return;\n  if (e.target.closest('.grp-actions')) return;\n  if (e.target.closest('.col-chk')) return;\n\n  const grp = e.target.closest('.grp');\n  if (!grp) return;\n\n  const id = grp.dataset.group;\n  const collapsed = grp.classList.toggle('collapsed');\n\n  // Also collapse the open bulk-edit row for this group\n  const bulkRow = document.querySelector(`tr.bulkrow[data-for=\"${id}\"]`);\n  if (bulkRow && collapsed) bulkRow.remove();\n\n  if (grp.classList.contains('grp-service')) {\n    // Service collapse: hide all countries + their configs + cities\n    document.querySelectorAll(`[data-parent=\"${id}\"]`).forEach((country) => {\n      country.classList.toggle('hidden', collapsed);\n      if (country.classList.contains('grp-country')) {\n        const cId = country.dataset.group;\n        document.querySelectorAll(`[data-parent=\"${cId}\"]`).forEach((kid) => {\n          kid.classList.toggle('hidden', collapsed);\n          // kid may be a config subgroup row → also hide its city rows\n          if (kid.classList.contains('grp-config')) {\n            const cfgId = kid.dataset.group;\n            document.querySelectorAll(`[data-parent=\"${cfgId}\"]`).forEach((leaf) => {\n              leaf.classList.toggle('hidden', collapsed);\n            });\n            if (collapsed) kid.classList.remove('collapsed');\n          }\n        });\n        if (collapsed) country.classList.remove('collapsed');\n      }\n    });\n  } else if (grp.classList.contains('grp-country')) {\n    // Country collapse: hide configs + cities under this country\n    document.querySelectorAll(`[data-parent=\"${id}\"]`).forEach((kid) => {\n      kid.classList.toggle('hidden', collapsed);\n      if (kid.classList.contains('grp-config')) {\n        const cfgId = kid.dataset.group;\n        document.querySelectorAll(`[data-parent=\"${cfgId}\"]`).forEach((leaf) => {\n          leaf.classList.toggle('hidden', collapsed);\n        });\n        if (collapsed) kid.classList.remove('collapsed');\n      }\n    });\n  } else {\n    // Config subgroup: hide its city rows\n    document.querySelectorAll(`[data-parent=\"${id}\"]`).forEach((child) => {\n      child.classList.toggle('hidden', collapsed);\n    });\n  }\n});\n\n/* ───── Bulk edit ───── */\nfunction getLeafRows(groupId, scope) {\n  // service → walk countries → configs → rows OR countries → rows\n  // country → walk configs → rows OR direct rows\n  // config  → direct rows\n  if (scope === 'service') {\n    const leaves = [];\n    document.querySelectorAll(`tr.grp-country[data-parent=\"${groupId}\"]`).forEach((country) => {\n      const cId = country.dataset.group;\n      // direct rows (single-config countries)\n      document.querySelectorAll(`tr.row[data-parent=\"${cId}\"]`).forEach((r) => leaves.push(r));\n      // rows under each config subgroup\n      document.querySelectorAll(`tr.grp-config[data-parent=\"${cId}\"]`).forEach((cfg) => {\n        document.querySelectorAll(`tr.row[data-parent=\"${cfg.dataset.group}\"]`).forEach((r) => leaves.push(r));\n      });\n    });\n    return leaves;\n  }\n  if (scope === 'country') {\n    const leaves = [];\n    document.querySelectorAll(`tr.row[data-parent=\"${groupId}\"]`).forEach((r) => leaves.push(r));\n    document.querySelectorAll(`tr.grp-config[data-parent=\"${groupId}\"]`).forEach((cfg) => {\n      document.querySelectorAll(`tr.row[data-parent=\"${cfg.dataset.group}\"]`).forEach((r) => leaves.push(r));\n    });\n    return leaves;\n  }\n  // config (or any direct-row scope)\n  return [...document.querySelectorAll(`tr.row[data-parent=\"${groupId}\"]`)];\n}\n\nfunction openBulkEdit(groupId, scope, anchorTr) {\n  // Close any other open bulk row\n  document.querySelectorAll('tr.bulkrow').forEach((r) => {\n    document.querySelector(`.grp[data-group=\"${r.dataset.for}\"]`)?.classList.remove('editing');\n    r.remove();\n  });\n\n  // Collect leaf rows under this group, then group them by country for the picker\n  const leafRows = getLeafRows(groupId, scope);\n  const byCountry = new Map(); // country → { flag, cities: [{name, id, row}], key }\n  leafRows.forEach((r) => {\n    const country = r.dataset.countryName || '';\n    const flag = r.dataset.flag || '';\n    if (!byCountry.has(country)) {\n      byCountry.set(country, { flag, cities: [], key: country.replace(/\\s+/g, '-').toLowerCase() });\n    }\n    byCountry.get(country).cities.push({ name: r.dataset.city, id: r.dataset.id, row: r });\n  });\n  const tree = [...byCountry.entries()].map(([country, info]) => ({\n    country, flag: info.flag, cId: `${groupId}-cnt-${info.key}`, cities: info.cities,\n  }));\n\n  const totalCities = tree.reduce((n, t) => n + t.cities.length, 0);\n  const targetLabel = scope === 'service'\n    ? `<b>${totalCities}<\u002Fb> cities across <b>${tree.length}<\u002Fb> countries`\n    : `<b>${totalCities}<\u002Fb> cities sharing this configuration`;\n\n  // Detect existing values across all leaf rows so we can pre-fill the form\n  const usdFixedSet = new Set();\n  const pctSet = new Set();\n  const defSet = new Set();\n  const statusSet = new Set();\n  const currencySet = new Set();\n  leafRows.forEach((r) => {\n    if (r.dataset.usdFixed) usdFixedSet.add(r.dataset.usdFixed);\n    if (r.dataset.pct) pctSet.add(parseFloat(r.dataset.pct).toFixed(2));\n    if (r.dataset.currency) currencySet.add(r.dataset.currency);\n    const dot = r.querySelector('.col-status .dot');\n    if (dot) statusSet.add(dot.classList.contains('green') ? 'green' : 'red');\n    const dchip = r.querySelector('.col-default .def-tag');\n    if (dchip) defSet.add(dchip.classList.contains('unchecked') ? 'unchecked' : dchip.classList.contains('required') ? 'required' : 'checked');\n  });\n  const sharedCurrency = currencySet.size === 1 ? [...currencySet][0] : '';\n  // Always input fixed fee in USD (consistent across the system)\n  const currencyHint = 'USD';\n  // Pre-fill: if all rows share the same underlying USD value, render it in the chosen currency\n  let initFixed = '';\n  let isMixedFixed = usdFixedSet.size > 1;\n  if (usdFixedSet.size === 1) {\n    const usd = parseFloat([...usdFixedSet][0]);\n    // Show enough precision to round-trip exactly to local currency on Apply\n    initFixed = (Math.round(usd * 10000) / 10000).toString();\n    if (!initFixed.includes('.')) initFixed += '.00';\n  }\n  const initPct     = pctSet.size === 1 ? [...pctSet][0] : '';\n  const isMixedPct  = pctSet.size > 1;\n  const initDef     = defSet.size === 1 ? [...defSet][0] : 'checked';\n  const initStatus  = statusSet.size === 1 ? [...statusSet][0] : 'green';\n\n  // Determine which service this bulk edit belongs to (so we can pre-fill name + actions)\n  let svcName = '';\n  let svcRow = anchorTr.classList.contains('grp-service') ? anchorTr : null;\n  if (!svcRow) {\n    // Walk up: find the parent service group via dataset.parent\n    let cur = anchorTr;\n    while (cur && !cur.classList.contains('grp-service')) {\n      const pid = cur.dataset?.parent;\n      cur = pid ? document.querySelector(`tr.grp[data-group=\"${pid}\"]`) : null;\n    }\n    svcRow = cur;\n  }\n  if (svcRow) {\n    const lbl = svcRow.querySelector('.grp-label');\n    if (lbl) {\n      // Service name is a raw text node sitting between the badge and the count.\n      // Walk childNodes and pick the first non-empty text node.\n      const txt = [...lbl.childNodes]\n        .filter((n) => n.nodeType === 3)\n        .map((n) => n.textContent.trim())\n        .find((t) => t.length > 0) || '';\n      svcName = txt;\n    }\n  }\n  // Map service → action key + Arabic/Russian names\n  const SVC_PROFILES = {\n    'Refund Guarantee': {\n      action: 'act-rg',\n      nameEn: 'Refund Guarantee',\n      nameAr: 'ضمان الاسترداد',\n      nameRu: 'Гарантия возврата',\n    },\n    'Send me tickets via WhatsApp': {\n      action: 'act-wa',\n      nameEn: 'Send me tickets via WhatsApp',\n      nameAr: 'أرسل لي التذاكر عبر واتساب',\n      nameRu: 'Отправить билеты в WhatsApp',\n    },\n    'WhatsApp Reminder': {\n      action: 'act-war',\n      nameEn: 'WhatsApp Reminder',\n      nameAr: 'تذكير واتساب',\n      nameRu: 'Напоминание в WhatsApp',\n    },\n  };\n  const svcProfile = SVC_PROFILES[svcName] || { action: '', nameEn: '', nameAr: '', nameRu: '' };\n\n  const tr = document.createElement('tr');\n  tr.className = 'bulkrow' + (scope !== 'service' ? ' country' : '');\n  tr.dataset.for = groupId;\n\n  // Build target picker HTML\n  const targetsHtml = tree.map((t) => `\n    <div class=\"country-block\" data-country-block=\"${t.cId}\">\n      <label class=\"country-row\">\n        <input type=\"checkbox\" class=\"chk country-cb\" data-cid=\"${t.cId}\" checked />\n        <span class=\"flag\"><svg width=\"18\" height=\"12\"><use href=\"#${t.flag}\"/><\u002Fsvg><\u002Fspan>\n        <span>${t.country}<\u002Fspan>\n        <span class=\"ccount\"><span class=\"csel\">${t.cities.length}<\u002Fspan>/${t.cities.length} cities<\u002Fspan>\n      <\u002Flabel>\n      <div class=\"city-chips\">\n        ${t.cities.map((c) => `<span class=\"city-chip on\" data-id=\"${c.id}\" data-cid=\"${t.cId}\">${c.name}<\u002Fspan>`).join('')}\n      <\u002Fdiv>\n    <\u002Fdiv>\n  `).join('');\n\n  tr.innerHTML = `\n    <td colspan=\"7\">\n      <div class=\"bulkpanel\">\n        <div class=\"bp-head\">\n          <span class=\"title\">\n            <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\"><path d=\"m15 5 6 6-9 9H6v-6Z\"/><path d=\"M3 17V7a2 2 0 0 1 2-2h6\"/><\u002Fsvg>\n            Bulk edit\n          <\u002Fspan>\n          <span class=\"arrow\">→<\u002Fspan>\n          <span class=\"target\" id=\"bp-target\">${targetLabel}<\u002Fspan>\n        <\u002Fdiv>\n\n        <div class=\"bp-scope\" data-k=\"scopepick\">\n          <button data-v=\"all\" class=\"on\">All cities <span class=\"badge\" id=\"bp-cnt-all\">${totalCities}<\u002Fspan><\u002Fbutton>\n          <button data-v=\"custom\">Custom selection <span class=\"badge\" id=\"bp-cnt-custom\">0<\u002Fspan><\u002Fbutton>\n        <\u002Fdiv>\n\n        <div class=\"bp-targets\" id=\"bp-targets\">\n          ${targetsHtml}\n        <\u002Fdiv>\n\n        <div class=\"bp-grid\">\n          <div class=\"bp-section\">\n            <span class=\"bp-lab\">Status &amp; Naming<\u002Fspan>\n            <div class=\"bp-row\">\n              <label>Status<\u002Flabel>\n              <div class=\"v\">\n                <span class=\"bp-seg\" data-k=\"status\">\n                  <button data-v=\"green\"${initStatus === 'green' ? ' class=\"on\"' : ''}><span class=\"dot green\"><\u002Fspan>Enabled<\u002Fbutton>\n                  <button data-v=\"red\"${initStatus === 'red' ? ' class=\"on\"' : ''}><span class=\"dot red\"><\u002Fspan>Disabled<\u002Fbutton>\n                <\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"bp-row\">\n              <label>Name (EN)<\u002Flabel>\n              <div class=\"v\">\n                <input type=\"text\" data-k=\"name-en\" value=\"${svcProfile.nameEn}\" placeholder=\"(unchanged)\" />\n                <span class=\"lang\">EN<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"bp-row\">\n              <label>Name (AR)<\u002Flabel>\n              <div class=\"v\">\n                <input type=\"text\" data-k=\"name-ar\" value=\"${svcProfile.nameAr}\" placeholder=\"(unchanged)\" dir=\"rtl\" style=\"text-align:right;\" />\n                <span class=\"lang ar\">AR<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"bp-row\">\n              <label>Name (RU)<\u002Flabel>\n              <div class=\"v\">\n                <input type=\"text\" data-k=\"name-ru\" value=\"${svcProfile.nameRu}\" placeholder=\"(unchanged)\" />\n                <span class=\"lang\">RU<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"bp-divider\"><\u002Fdiv>\n\n          <div class=\"bp-section\">\n            <span class=\"bp-lab\">Fees &amp; Default<\u002Fspan>\n            <div class=\"bp-row\">\n              <label>Fixed fee<\u002Flabel>\n              <div class=\"v\">\n                <input type=\"number\" step=\"0.01\" value=\"${init
